<!DOCTYPE html>
<html>
<head>
<title>Sistem Stok Sapi</title>
<link rel="stylesheet" href="Style/style.css">
</head>

<body>

    <h1>Sistem Pembelian Sapi</h1>

    <div class="container">

    <h2>Stok Sapi</h2>

    <label>Jenis Sapi</label><br>
        <select id="jenis">
            <option>Pilih Jenis Sapi</option> 
            <option value="limosin">Limosin</option>
            <option value="brahman">Brahman</option>
            <option value="simental">Simental</option>
            <option value="angus">Angus</option>
        </select><br>

    <label>Berat</label><br>
    <input type="number" id="berat"><br>

    <label>Umur</label><br>
    <input type="number" id="umur"><br>

    <button id="tambahBtn">Tambah Sapi</button>

    </div>

    <div id="totalStok">
        <p>Total Sapi Terjual: <span id="totalJumlah">0</span></p>
        <p>Total Harga Terjual: <span id="totalNilai">Rp 0</span></p>
    </div>

    <h2>Data Sapi Terjual</h2>

    <table border="1">
    <thead>
    <tr>
    <th>No</th>
    <th>ID</th>
    <th>Jenis</th>
    <th>Berat</th>
    <th>Harga</th>
    <th>Umur</th>
    <th>tanggal Beli</th>
    <th></th>
    </tr>
    </thead>

    <tbody id="tabelSapi"></tbody>

    </table>

<script src="script.js"></script>

</body>
</html>
